name: Injection Lockdown Test

on:
  issues:
    types: [opened]

jobs:
  untrusted-input-job:
    runs-on: ubuntu-latest
    steps:
      - name: Log Issue Title (VULNERABLE)
        # The pipe symbol ensures YAML doesn't choke on the quotes or brackets below
        run: |
          echo "New issue title is: ${{ github.event.issue.title }}"
